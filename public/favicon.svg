<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0A0A0A"/>
  <!-- Left C — 270° arc opening right — r=96, dasharray=453 151, rotated 45° so gap faces right -->
  <circle cx="178" cy="256" r="96" fill="none" stroke="white" stroke-width="50"
    stroke-dasharray="453 151" stroke-linecap="round"
    transform="rotate(45 178 256)"/>
  <!-- Right C — same arc, 50% opacity for depth -->
  <circle cx="334" cy="256" r="96" fill="none" stroke="white" stroke-width="50"
    stroke-opacity="0.5" stroke-dasharray="453 151" stroke-linecap="round"
    transform="rotate(45 334 256)"/>
</svg>
